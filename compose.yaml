services:
  postgres:
    image: postgres:17-alpine
    container_name: sistema-ventas-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ventas_rutas}
      POSTGRES_USER: ${POSTGRES_USER:-ventas_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ventas_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

